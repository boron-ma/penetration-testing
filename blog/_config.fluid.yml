# -----------------------------------------
# Fluid 主题专用定制配置文件
# -----------------------------------------

# ---------------------------
# 一、 全局主题基础外观与色彩
# ---------------------------
# 日夜间模式
dark_mode:
  enable: true        # 开启日夜间手动切换
  default: light      # 默认日间模式

# 页面入场动画
web_animations:
  enable: true        # 开启页面入场动画

# 回到顶部按钮
scroll_top_btn:
  enable: true
  arrow_up_icon: "iconfont icon-arrowup"

# 颜色全局配置
color:
  # 日间模式核心配色
  light:
    text_color: "#3c4858"
    background_color: "#f8f9fa"
    link_color: "#37c6c0"
    link_hover_color: "#2bb0aa"
    navbar_bg_color: "#2f4154"
  # 夜间模式核心配色
  dark:
    text_color: "#c4c6c9"
    background_color: "#1d1e22"
    link_color: "#37c6c0"
    link_hover_color: "#2bb0aa"

# ---------------------------
# 二、 导航栏配置
# ---------------------------
navbar:
  blog_title: "Byron's Security Lab"
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tags", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }
    - { key: "github", link: "https://github.com/byroins/penetration-testing", icon: "iconfont icon-github-fill" }

# ---------------------------
# 三、 首页配置
# ---------------------------
index:
  banner_img: ""
  text: "Stay Hungry, Stay Foolish."
  slogan:
    enable: true
    text: "Web Penetration Testing / Vulnerability Reproduction / Source Code Auditing / SRC / Focused on Hands-on Security Research"
    # 打字机效果（正确键名：typed）
    typed:
      enable: true
      typeSpeed: 40    # 打字速度，单位毫秒/字，数值越小越快
      startDelay: 0    # 零延迟开始，解决文字出来慢
      loop: false      # 关闭循环打字

  # 文章摘要
  excerpt:
    enable: true
    max_lines: 5
  post_url_target: _self

  # 查看全文按钮
  read_more_btn:
    enable: true
    text: "阅读全文"

# ---------------------------
# 四、 独立页面 Banner 配置
# ---------------------------
archive:
  banner_img: ""
category:
  banner_img: ""
tag:
  banner_img: ""
  tagcloud:
    min_img_size: 14
    max_img_size: 26
about:
  banner_img: ""

# ---------------------------
# 五、 文章页核心配置
# ---------------------------
post:
  banner_img: ""

  # 文章元信息
  meta:
    author:
      enable: true
      name: "Byron"
    date:
      enable: true
      format: "YYYY-MM-DD"
    updated:
      enable: true
      format: "YYYY-MM-DD"
    category:
      enable: true
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 300
    views:
      enable: true

  # 文章目录
  toc:
    enable: true
    heading_selector: "h1,h2,h3,h4,h5,h6"
    collapse_depth: 3
    number: true

  # 上一篇/下一篇导航
  prev_next:
    enable: true

  # 顶部阅读进度条
  reading_progress:
    enable: true
    anchor: top
    height: 3px
    color: "#37c6c0"

# ---------------------------
# 六、 全局代码块增强
# ---------------------------
code:
  copy_btn: true
  highlight:
    lib: "highlightjs"
    style: "Mac"
    bg_color: true
  fold:
    enable: true
    height: 400

# ---------------------------
# 七、 页脚配置
# ---------------------------
footer:
  content: '© 2026 Byron'
  statistics:
    enable: true
    pv_format: "Total Views: {}"
    uv_format: "Total Visitors: {}"

# ---------------------------
# 八、 本地搜索引擎与优化
# ---------------------------
search:
  enable: true
  path: search.xml
  field: post
  content: true

# ---------------------------
# 九、 性能与资源优化
# ---------------------------
lazyload:
  enable: true

# 自定义资源引入（顶级配置，不要缩进）
custom_css:
  - /css/custom.css

custom_js:
  - src: https://cdn.bootcdn.net/ajax/libs/medium-zoom/1.0.6/medium-zoom.min.js